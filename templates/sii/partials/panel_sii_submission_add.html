{% load djicons i18n %}

<div class="side-sheet-header">
    <h3 class="sheet-title">{% trans "Add Siisubmission" %}</h3>
    <button class="sheet-close" @click="closePanel()">{% icon "close-outline" %}</button>
</div>

<div class="side-sheet-content">
    <form id="add-sii_submission-form"
          hx-post="{% url 'sii:sii_submission_add' %}"
          hx-target="#datatable-body"
          hx-swap="innerHTML"
          @htmx:after-request="closePanel()"
          class="flex flex-col gap-4 p-6">
        {% csrf_token %}

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Reference" %}</label>
            <input type="text" name="reference" class="input input-sm w-full" placeholder="{% trans 'Reference' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Submission Type" %}</label>
            <input type="text" name="submission_type" class="input input-sm w-full" placeholder="{% trans 'Submission Type' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Period" %}</label>
            <input type="text" name="period" class="input input-sm w-full" placeholder="{% trans 'Period' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
            <select name="status" class="select select-sm w-full">
                <option value="">{% trans "Select..." %}</option>
            </select>
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Submitted At" %}</label>
            <input type="datetime-local" name="submitted_at" class="input input-sm w-full">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Response Code" %}</label>
            <input type="text" name="response_code" class="input input-sm w-full" placeholder="{% trans 'Response Code' %}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Response Message" %}</label>
            <textarea name="response_message" class="textarea textarea-sm w-full" rows="3"></textarea>
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Records Count" %}</label>
            <input type="number" name="records_count" class="input input-sm w-full"  placeholder="0">
        </div>
    </form>
</div>

<div class="side-sheet-footer">
    <div class="flex justify-end gap-2">
        <button type="button" class="btn btn-ghost btn-sm" @click="closePanel()">{% trans "Cancel" %}</button>
        <button type="submit" form="add-sii_submission-form" class="btn btn-sm color-primary">
            {% icon "add-outline" %} {% trans "Add" %}
        </button>
    </div>
</div>
